# Environment configuration for SAC training
rollout:

  # Number of pipeline stages used by the env-loop rollout.
  pipeline_stage_num: 2

actor:
  model:

    # Number of action chunks predicted at each step.
    num_action_chunks: 8

    # Action dimension for the robot policy head.
    action_dim: 7

train:

  # Device used by environment workers: typically "cpu" or "cuda".
  device: cpu

  # Simulator backend for LIBERO tasks.
  simulator_type: libero

  # Maximum number of environment steps per episode.
  max_episode_steps: 512

  # Multiplier applied to positive task reward.
  reward_coef: 1.0

  # Per-step penalty used to encourage shorter successful trajectories.
  step_penalty: 0.001

  # Dense success reward (arena): keep post-success steps valid so the latched +1 enters the
  # pool for all of them; -1 timeout only on never-successful trajectories. Default False =
  # legacy single-+1-per-success behaviour (bit-identical for pi0.5/libero/isaac).
  dense_success_reward: False

  # Graded SUBTASK reward (arena, SEQUENTIAL tasks): reward = fraction of subtasks done
  # (0/0.5/1.0). Supersedes dense_success_reward when True. Default False = composite-only.
  subtask_reward: False

  # Number of sequential subtasks for the sr_subtask{k} metrics; null = infer from graded levels.
  num_subtasks: null

  # Asymmetric actor-critic: privileged critic-only obs (arena `critic_privileged` obs group).
  # The env passes the group through to the critic; pair with model-side
  # override_config.critic_privileged_obs(_dim). Arena-only; default off elsewhere.
  critic_privileged_obs: False

  # If True, only run evaluation without training updates.
  only_eval: False

  # Video recording options for rollouts.
  video_cfg:

    # Whether to save rollout videos.
    save_video: True

    # Output directory for saved rollout videos.
    video_base_dir: /tmp/videos

  # Number of simulator environments hosted by each env worker.
  num_envs: 16

  # Random seed for env initialization and reset sampling.
  seed: 42

  # LIBERO task suite name.
  task_suite_name: libero_spatial

  # Simulator-specific initialization parameters.
  init_params:

    # Whether to render depth images from cameras.
    camera_depths: False

    # Camera image height.
    camera_heights: 256

    # Camera image width.
    camera_widths: 256

    # Camera views included in each observation.
    camera_names:
      - agentview
      - robot0_eye_in_hand

disagg_sim:

  # Whether simulator workers run on separate nodes from training workers.
  enable: False

  # Number of simulator nodes when disaggregated simulation is enabled.
  nnodes: 1
