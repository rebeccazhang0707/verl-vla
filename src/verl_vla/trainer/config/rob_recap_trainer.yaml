defaults:

  # Stage 1: collect rollout data into a LeRobot dataset.
  - /trainer/recap/recap_collect_data@recap.collect_data

  # Stage 2: compute RECAP returns for the collected LeRobot dataset.
  - /trainer/recap/recap_compute_return@recap.compute_return

  # Stage 3: train the RECAP value model with actor-only SFT.
  - /trainer/recap/recap_train_value_model@recap.train_value_model

  # Stage 4: infer RECAP values and write them back to the LeRobot dataset.
  - /trainer/recap/recap_value_infer@recap.value_infer

  # Stage 5: train the final RECAP policy with actor-only SFT.
  - /trainer/recap/recap_train_policy@recap.train_policy

  # Stage 6: evaluate the final RECAP policy on the environment benchmark.
  - /trainer/recap/recap_policy_eval@recap.policy_eval

  - _self_


# Ray initialization options shared by RECAP stages.
ray_kwargs:

  # Arguments forwarded to ray.init.
  ray_init:
    num_cpus: null
