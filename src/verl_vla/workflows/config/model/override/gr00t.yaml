# GR00T N1.6 compatibility fields for verl/FSDP and deterministic rollout.

# Compatibility metadata used by verl's sequence-parallel config patch.
num_attention_heads: 32

# N1.6 does not use grouped-query attention at this wrapper level.
num_key_value_heads: 32

# Optional processor source; null uses the loaded checkpoint directory.
verl_processor_path: null

# Optional runtime statistics override; merged checkpoints carry statistics.
norm_stats_path: null

# Number of predicted actions executed per environment interaction.
verl_action_chunk_size: 8

# --- Arena / SAC overrides (optional; used when policy_type=arena / sac_enable) ---

# Select the Arena policy IO adapter (Gr00tInput/Gr00tOutput).
policy_type: arena

# GR00T embodiment tag (drives projector index + processor modality config).
embodiment_tag: gr1

# Attention implementation forwarded to the top-level model load. The Eagle backbone
# is force-patched to flash_attention_2 regardless (see _patch_eagle_compat).
attn_implementation: eager

# Enable SAC-specific critic heads.
sac_enable: True

# Critic backend: cross_attn -> learnable cross-attention VL pooling (critic_pooling=attn).
critic_type: cross_attn

# Number of critic heads (ensemble).
critic_head_num: 10

# Number of prefix cross-attention heads for the critic pool.
critic_prefix_attn_heads: 8

# Real (unpadded) env action width + projector index for GR1 (not in the gr00t config).
action_dim: 26
embodiment_id: 20

# Env action chunk length executed per interaction (<= checkpoint action_horizon).
num_action_chunks: 16

# Critic scores only the executed chunk (not the full decoded horizon, often 50).
# Keep in sync with num_action_chunks unless you intentionally widen the critic.
critic_action_horizon: 16

# Freeze the Eagle vision tower for online RL (mirrors pi0.5).
freeze_vision_tower: True

# --- Flow-SDE (stochastic flow sampler; arXiv:2510.25889) ---
# When disabled the sampler reduces bit-identically to the deterministic Euler ODE.
flow_sde_enable: False

# Base Flow-SDE per-step noise level.
flow_sde_noise_level: 0.065

# Rollout-time Flow-SDE noise scale.
flow_sde_rollout_noise_scale: 1.0

# Train-time Flow-SDE noise scale.
flow_sde_train_noise_scale: 1.0

# Initial Flow-SDE beta.
flow_sde_initial_beta: 1.0

# Minimum Flow-SDE beta.
flow_sde_beta_min: 0.02

# Flow-SDE beta cosine-anneal horizon (optimiser steps).
flow_sde_beta_schedule_T: 4000

