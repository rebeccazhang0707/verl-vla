# ACT LIBERO adapter configuration.

# Select the LIBERO policy path in the model implementation.
policy_type: libero

# Dataset root used to initialize LeRobot's native processors when the model
# artifact contains only an ACT config and no saved processor artifacts yet.
processor_dataset_root: null

# Optional critic owned by the ACT adapter.
critic:

  # Whether this component is enabled.
  enabled: False

  # Backend or implementation type selected for this component.
  type: mean_pool

  # Number of attention heads in the critic.
  head_num: 2

  # Embedding dimension of the critic prefix encoder.
  prefix_embed_dim: 512

  # Input feature dimension for the critic.
  input_dim: 0

  # Hidden-layer dimensions for the critic.
  hidden_dims: [1024, 512, 256]

# SAC action-noise scale.
sac_action_noise_scale: 0.1

# Whether SAC action-noise scheduling is enabled.
sac_action_noise_schedule_enabled: False

# Initial SAC scheduled action-noise value.
sac_action_noise_schedule_initial: null

# Final SAC scheduled action-noise value.
sac_action_noise_schedule_final: null

# SAC action-noise schedule method.
sac_action_noise_schedule_method: cos

# Whether to freeze the vision tower during training.
freeze_vision_tower: True
