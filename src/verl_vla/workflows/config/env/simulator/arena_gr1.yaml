# Isaac Lab Arena simulator configuration for the GR1 fridge task (GR00T, gr1_joint).
#
# NOTE: this task requires the Isaac Sim / GR00T docker image (isaaclab_arena*,
# isaaclab_arena_gr00t, lightwheel assets, and the gr00t package). It is not
# exercisable in the plain verl-vla environment and has not been runtime-validated
# here; the values below mirror the legacy run_gr00t_arena_gr1_sac* launchers.

_target_: verl_vla.envs.arena.config.ArenaSimulatorConfig

simulator_type: arena

# Embodiment adapter: GR1 humanoid, joint-space control (54-DOF state -> 26 GR00T,
# 26 GR00T action -> 36-DOF sim action via the joint-space YAMLs).
arena_state_mode: gr1_joint

# Joint-space mapping YAMLs (policy 26-DOF / sim action 36-DOF / sim state 54-DOF).
arena_joint_space_spec: gr1
arena_joint_space_dir: ${oc.env:ARENA_GR1_JOINT_SPACE_DIR}
arena_joint_space_policy_yaml: gr00t_26dof_joint_space.yaml
arena_joint_space_action_yaml: 36dof_joint_space.yaml
arena_joint_space_state_yaml: 54dof_joint_space.yaml

seed: 42

# GR00T GR1 policy action width (26-DOF); scattered to the 36-DOF sim action.
action_dim: 26

# GR1 sequential fridge task ("put the sauce bottle on the top shelf, then close the door").
env_name: put_item_in_fridge_and_close_door
object: ranch_dressing_hope_robolab
embodiment: gr1_joint
kitchen_style: 2
task_description: Place the sauce bottle on the top shelf of the fridge, and close the fridge door.

enable_cameras: true
# All cameras in one flat list (POV + wrist), read uniformly by JointSpaceEmbodiment.
camera_names:
  - robot_pov_cam_rgb
  - right_wrist_cam_rgb
image_shape:
  - 512
  - 512
  - 3

rl_success_reward: true
# Sequential task: graded subtask progress (0 / 0.5 / 1.0) for earlier credit.
subtask_reward: true

# Denser packing than the G1 default (30) — GR1 fridge scenes are smaller.
env_spacing: 5.0
disable_fabric: false
solve_relations: true
enable_pinocchio: true

# Policy-driven joint control (not G1 stable-hold).
use_policy_action: true
