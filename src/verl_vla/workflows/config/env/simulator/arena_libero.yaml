# Isaac Lab Arena simulator configuration for LIBERO tasks using Franka EEF control.
#
# This configuration requires the Isaac Sim GR00T image
# (isaaclab_arena:cuda_gr00t_gn16) and the external Arena LIBERO environment.
# Launch it through
# examples/arena_sac/run_gr00t_arena_libero_sac.sh (train) or
# run_gr00t_arena_libero_spatial_task3_eval.sh (eval).

# Typed configuration constructed by Hydra.
_target_: verl_vla.envs.arena.config.ArenaLiberoSimulatorConfig

# Simulator backend -----------------------------------------------------------

# Simulator backend selected by EnvWorker.
simulator_type: arena

# Random seed for Arena placement and simulator initialization.
seed: 42

# Policy and embodiment -------------------------------------------------------

# Franka end-effector absolute-IK adapter. Simulator actions contain position,
# quaternion, and gripper commands.
arena_state_mode: eef_pose

# GR00T LIBERO action width: position (3), relative rotation vector (3), and
# gripper (1). The embodiment adapter converts this to the simulator's 8-D
# absolute-IK action containing an XYZW quaternion.
action_dim: 7

# Policy state width exposed by the Franka embodiment adapter.
state_dim: 7

# External environment --------------------------------------------------------

# Arena environment name used for the migrated LIBERO benchmark.
env_name: libero

# Import path for the external Arena LIBERO environment implementation.
external_env_class_path: isaaclab_arena_examples.external_environments.libero:LiberoEnvironment

# Robot name stored in recorder metadata. Arena itself uses NoEmbodiment with
# the ported absolute-IK configuration.
embodiment: franka

# Fallback language instruction when the external task provides none.
task_description: Complete the LIBERO manipulation task.

# LIBERO task suite to load through the external environment.
libero_task_suite: libero_spatial

# Zero-based task index within the selected LIBERO suite.
libero_task_id: 3

# Observations and recording --------------------------------------------------

# Enable camera sensors in the Arena environment.
enable_cameras: true

# Camera observations exported to the policy and recorder. Arena reads these
# from camera_obs using its {sensor}_{dtype} naming convention.
camera_names:
  - agentview_cam_rgb
  - eye_in_hand_cam_rgb

# Expected height, width, and channel count for recorder metadata.
image_shape:
  - 224
  - 224
  - 3

# Reward ----------------------------------------------------------------------

# Replace the absent native task reward with a sparse success reward.
rl_success_reward: true

# Use final task success rather than graded subtask progress.
subtask_reward: false

# Arena runtime ---------------------------------------------------------------

# Spacing between vectorized Arena environments.
env_spacing: 3.0

# Whether to disable Isaac Lab Fabric in the simulator.
disable_fabric: false

# Whether Arena should solve scene relation constraints during construction.
solve_relations: true

# Enable Pinocchio support in the Arena environment.
enable_pinocchio: true
