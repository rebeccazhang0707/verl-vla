# Franka LIBERO task-space environment hosted by Isaac Lab Arena.

# Typed environment configuration constructed by Hydra.
_target_: verl_vla.envs.arena.config.ArenaLiberoEnvironmentConfig

# Control space ----------------------------------------------------------------

# End-effector pose adapter for Franka absolute-IK control.
arena_state_mode: eef_pose

# Width of the GR00T position, rotation-vector, and gripper action.
action_dim: 7

# Width of the corresponding policy state.
state_dim: 7

# Environment and assets -------------------------------------------------------

# Arena name assigned to the migrated LIBERO benchmark.
env_name: libero

# Import path used to register the external Arena environment.
external_env_class_path: isaaclab_arena_examples.external_environments.libero:LiberoEnvironment

# Robot name stored in Arena and recorder metadata.
embodiment: franka

# Fallback language instruction when the task supplies none.
task_description: Complete the LIBERO manipulation task.

# LIBERO task suite loaded by the external environment.
libero_task_suite: libero_spatial

# Zero-based task index within the selected LIBERO suite.
libero_task_id: 3

# Observations -----------------------------------------------------------------

# Camera observations exported to the policy and recorder.
camera_names:
  - agentview_cam_rgb
  - eye_in_hand_cam_rgb

# Expected height, width, and channel count for recorder metadata.
image_shape:
  - 224
  - 224
  - 3

# Reward -----------------------------------------------------------------------

# Use final task success rather than graded subtask progress.
subtask_reward: false

# Runtime behavior -------------------------------------------------------------

# Franka LIBERO scenes support dense vectorized placement.
env_spacing: 3.0

# Execute task-space GR00T actions directly.
use_policy_action: true
