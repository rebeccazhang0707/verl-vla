# Fourier GR1 joint-space Arena environment for the sequential fridge task.

# Typed environment configuration constructed by Hydra.
_target_: verl_vla.envs.arena.config.ArenaEnvironmentConfig

# Control space ----------------------------------------------------------------

# Mapped joint-space adapter for Fourier GR1.
arena_state_mode: gr1_joint

# Width of the GR00T policy action and state.
action_dim: 26

# GR00T embodiment specification used to build the joint mapping.
arena_joint_space_spec: gr1

# Directory containing the policy, simulator-action, and simulator-state maps.
# It may remain unset while another Arena environment is selected.
arena_joint_space_dir: ${oc.env:ARENA_GR1_JOINT_SPACE_DIR,null}

# Joint ordering for the 26-DOF GR00T policy action and state.
arena_joint_space_policy_yaml: gr00t_26dof_joint_space.yaml

# Joint ordering for the 36-DOF Arena simulator action.
arena_joint_space_action_yaml: 36dof_joint_space.yaml

# Joint ordering for the 54-DOF Arena simulator state.
arena_joint_space_state_yaml: 54dof_joint_space.yaml

# Environment and assets -------------------------------------------------------

# Registered Arena environment name.
env_name: put_item_in_fridge_and_close_door

# Object asset placed in the fridge task.
object: ranch_dressing_hope_robolab

# Robot embodiment passed to the Arena environment builder.
embodiment: gr1_joint

# Kitchen/background variant used by the Arena task.
kitchen_style: 2

# Fallback language instruction when the task supplies none.
task_description: Place the sauce bottle on the top shelf of the fridge, and close the fridge door.

# Observations -----------------------------------------------------------------

# Camera observations exported to the policy and recorder.
camera_names:
  - robot_pov_cam_rgb
  - right_wrist_cam_rgb

# Expected height, width, and channel count for recorder metadata.
image_shape:
  - 512
  - 512
  - 3

# Reward -----------------------------------------------------------------------

# Grade the sequential subtasks as 0, 0.5, and 1.0.
subtask_reward: true

# Runtime behavior -------------------------------------------------------------

# GR1 fridge scenes support denser packing than G1 WBC scenes.
env_spacing: 5.0

# Execute mapped GR00T actions directly.
use_policy_action: true
