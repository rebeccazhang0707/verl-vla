# Isaac Lab Arena simulator backend configuration.

# Hydra configuration composition order.
defaults:

  # Unitree G1 whole-body-control environment.
  - /env/simulator/arena@g1: g1

  # Fourier GR1 joint-space environment.
  - /env/simulator/arena@gr1: gr1

  # Franka LIBERO task-space environment.
  - /env/simulator/arena@libero: libero

  # Apply shared Arena settings and the environment selector last.
  - _self_


# Typed Arena backend configuration constructed by Hydra.
_target_: verl_vla.envs.arena.config.ArenaSimulatorConfig

# Environment profile selected within the Arena backend: g1, gr1, or libero.
environment: g1

# Backend identifier retained for the nested simulator contract.
simulator_type: arena

# Random seed for Arena placement and simulator initialization.
seed: 42

# Whether the selected Arena environment enables camera sensors.
enable_cameras: true

# Whether to install the Arena task-success reward.
rl_success_reward: true

# Whether to disable Isaac Lab Fabric in the simulator.
disable_fabric: false

# Whether Arena should solve scene relation constraints during construction.
solve_relations: true

# Whether to enable Pinocchio support in Arena environments.
enable_pinocchio: true

# Optional placement seed forwarded to the Arena builder.
placement_seed: null

# Optional override for resolving scene relations again on reset.
resolve_on_reset: null

# Optional Arena placement preset.
presets: null
