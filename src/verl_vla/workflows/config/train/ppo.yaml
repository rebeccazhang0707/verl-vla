# The VLA PPO workflow extends verl's default PPO trainer config.

# Hydra runtime configuration.
hydra:

  # Additional Hydra configuration search paths.
  searchpath:

    - pkg://verl.trainer.config
    - pkg://verl_vla.workflows.config

# Hydra configuration composition order.
defaults:

  - /ppo_trainer
  - _self_

# Environment execution configuration.
env:

  # Policy rollout configuration.
  rollout:

    # Number of stages in the environment rollout pipeline.
    pipeline_stage_num: 2

  # Actor training configuration.
  actor:

    # Policy model configuration.
    model:

      # Number of action chunks predicted per model call.
      num_action_chunks: 8

      # Number of dimensions in each action.
      action_dim: 7

  # Environment training-mode configuration.
  train:

    # Simulator backend selected for this workflow.
    simulator_type: libero

    # Maximum simulator steps in one episode.
    max_episode_steps: 512

    # Maximum policy/environment interactions in one rollout.
    max_interactions: null

    # Whether completed environments reset automatically.
    auto_reset: False

    # Scale applied to environment rewards.
    reward_coef: 1.0

    # Whether to run evaluation without training.
    only_eval: False

    # Rollout video recording configuration.
    video_cfg:

      # Whether rollout videos are written to disk.
      save_video: True

      # Directory where rollout videos are stored.
      video_base_dir: /tmp/videos

    # Number of simulator environments hosted by each worker.
    num_envs: 16

    # Random seed for this workflow.
    seed: 42

    # LIBERO simulator configuration.
    libero:

      # LIBERO task suite evaluated by this workflow.
      task_suite_name: libero_10

      # Number of no-op steps performed after simulator reset.
      reset_warmup_steps: 10

      # Simulator initialization parameters.
      init_params:

        # Whether simulator observations include depth images.
        camera_depths: False

        # Camera image height in pixels.
        camera_heights: 256

        # Camera image width in pixels.
        camera_widths: 256

        # Camera streams included in observations.
        camera_names:

          - agentview
          - robot0_eye_in_hand
    
    # Profile the env worker
    profiler:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.ProfilerConfig

      # Profiling tool to use
      # options: nsys, npu, torch, torch_memory
      # Defaults to global_profiler.tool if set
      tool: ${oc.select:global_profiler.tool,null}

      # Whether to enable profiling for env worker
      enable: False

      # Whether to profile all ranks
      all_ranks: False

      # List of ranks to profile (empty means no specific ranks)
      ranks: []

      # Path to save profiling results
      # Defaults to global_profiler.save_path if set
      save_path: ${oc.select:global_profiler.save_path,null}

      # Tool-specific configurations
      tool_config:

        # nsys tool config
        nsys:

          # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
          _target_: verl.utils.profiler.config.NsightToolConfig
        
          # True for each task has its own database, False for all tasks in one training step share one database.
          discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete}
        
        # npu config
        npu:

          # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
          _target_: verl.utils.profiler.config.NPUToolConfig

          # Contents to profile, can be empty
          # options: npu, cpu, memory, shapes, module, stack
          contents: []

          # Collection level, optional values: level_none, level0, level1, level2.
          level: "level1"

          # Whether to automatically parse the data.
          analysis: True

          # True for each task has its own database, False for all tasks in one training step share one database.
          discrete: False
        
        # torch profiler config
        torch:

          # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig

          # Contents to profile, can be empty
          # options: cuda, cpu, memory, shapes, stack
          contents: []

          # True for each task has its own database, False for all tasks in one training step share one database.
          discrete: False


        # torch memory profiler config
        torch_memory:

          # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
          _target_: verl.utils.profiler.config.TorchMemoryToolConfig

          # Maximum number of memory allocation entries to track
          trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}

          # Stack trace depth for memory allocations
          stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}

  # Disaggregated simulator resource configuration.
  disagg_sim:

    # Whether this component is enabled.
    enable: False

    # Number of nodes allocated to this role.
    nnodes: 1


# Shared actor, rollout, and reference-policy configuration.
actor_rollout_ref:

  # Actor training configuration.
  actor:

    # Number of observation images consumed by each policy input.
    num_images_in_input: 1

    # Number of trajectories in each actor mini-batch.
    traj_mini_batch_size: 16

    # FSDP execution configuration.
    fsdp_config:

      # FSDP module wrapping policy.
      wrap_policy:

        # Transformer layer classes wrapped as individual FSDP units.
        transformer_layer_cls_to_wrap: 

          - PrismaticProjector
          - LlamaDecoderLayer
        # Minimum module size selected by the FSDP wrapping policy.
        min_num_params: 0

      # Whether FSDP parameters are offloaded to CPU.
      param_offload: False

      # Whether FSDP optimizer state is offloaded to CPU.
      optimizer_offload: False

      # Whether FSDP prefetches the next forward all-gather.
      forward_prefetch: True

      # Number of ranks in each FSDP group; negative uses all ranks.
      fsdp_size: -1

  # Policy rollout configuration.
  rollout:

    # Execution mode selected for this component.
    mode: async_envloop

    # Maximum prompt length in tokens.
    prompt_length: 512
